# MOVA: sitio estático exportado desde Laravel (Netlify no ejecuta PHP en runtime).
[build]
  command = "composer install --no-interaction --prefer-dist --optimize-autoloader && php -r \"file_exists('.env') || copy('.env.example', '.env');\" && php artisan key:generate --force && php artisan mova:export-static && npm run build"
  publish = "public"

[build.environment]
  APP_ENV = "production"
  APP_DEBUG = "false"
